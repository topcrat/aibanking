server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # AI Agent API — must come before /api/ to match first
    location /api/agent/ {
        proxy_pass https://aiagentservice.onrender.com/api/agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Main Banking API
    location /api/ {
        proxy_pass https://aibanking-sb1g.onrender.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
