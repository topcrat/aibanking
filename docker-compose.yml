services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aibanking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-P@ssw0rd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: AIBanking/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=aibanking;Username=postgres;Password=${POSTGRES_PASSWORD:-P@ssw0rd}
      - JwtSettings__Issuer=http://localhost:3000
      - JwtSettings__Audience=AIBankingClient
      - JwtSettings__Key=${JWT_KEY:-SuperSecretKeyForAIBankingWhichMustBeAtLeast256Bits!}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Anthropic__DeploymentName=${ANTHROPIC_MODEL:-claude-opus-4-6}
      - AdminDefaults__Password=${ADMIN_PASSWORD:-Admin@1234!}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  aiagent:
    build:
      context: .
      dockerfile: AIBanking.AIAgent/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=aibanking;Username=postgres;Password=${POSTGRES_PASSWORD:-P@ssw0rd}
      - JwtSettings__Issuer=http://localhost:3000
      - JwtSettings__Audience=AIBankingClient
      - JwtSettings__Key=${JWT_KEY:-SuperSecretKeyForAIBankingWhichMustBeAtLeast256Bits!}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Anthropic__DeploymentName=${ANTHROPIC_MODEL:-claude-opus-4-6}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: AIBanking.Web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
      aiagent:
        condition: service_healthy

volumes:
  postgres_data:
